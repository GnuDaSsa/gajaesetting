# Mindlogic FactChat API Gateway — https://docs.mindlogic.ai/docs/seongnam/api-gateway/
# Chat: POST .../v1/gateway/chat/completions/  (OpenAI-compatible)
# Discovery uses /v1/models — Mindlogic lists at /v1/gateway/models/, so register models explicitly.
providers:
  factchat-gateway:
    baseUrl: https://factchat-cloud.mindlogic.ai/v1/gateway
    apiKeyEnv: MINDLOGIC_GATEWAY_API_KEY
    api: openai-completions
    auth: apiKey
    models:
      - id: gpt-5.5
      - id: gpt-5.6-sol
      - id: gpt-5.6-terra
      - id: gpt-5.6-luna
      - id: claude-sonnet-5
      - id: claude-opus-4-8
      - id: grok-4-1-fast
      - id: gemini-3.5-flash